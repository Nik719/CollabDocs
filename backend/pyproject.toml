[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["venv", "*/migrations/*"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, B: bugbear, DJ: flake8-django
select = ["E", "W", "F", "I", "B", "DJ"]
ignore = [
    "E501",  # long lines in docstrings/comments are tolerated
]

[tool.ruff.lint.isort]
known-first-party = ["api", "collabdocs"]
